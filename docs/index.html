<!doctype html>
<html lang='zh'>
<head>
<meta charset='UTF-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/>
<title>20260429-gold 回测看板</title>
<script src='https://cdn.plot.ly/plotly-2.35.2.min.js'></script>
<style>
body{margin:14px;background:#0b1020;color:#eaf0ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif}
h1{font-size:20px;margin:0 0 8px}
.panel{background:#131b3b;border:1px solid #28356a;border-radius:10px;padding:10px;margin-bottom:10px}
.row{display:flex;flex-wrap:wrap;gap:6px}
.btn{border:1px solid #3a4a86;background:#121b40;color:#dfe8ff;padding:5px 10px;border-radius:8px;cursor:pointer;font-size:12px}
.btn.active{background:#2e4fbe;border-color:#6f92ff;color:#fff}
input{width:100%;padding:8px;border-radius:8px;border:1px solid #334;background:#0f1736;color:#fff}
table{width:100%;border-collapse:collapse;background:#121a3b;border-radius:10px;overflow:hidden}
th,td{padding:7px 8px;border-bottom:1px solid #2a3768;text-align:left;font-size:12px}
th{background:#1a2758;position:sticky;top:0}
.muted{opacity:.8;font-size:12px;margin:6px 0}
#chart{height:460px}
</style>
</head>
<body>
<h1>20260429-gold · 回测策略看板</h1>

<div class='panel'>
  <div><b>BTC 走势曲线（固定起点 2017-11-01）</b></div>
  <div id='chart' style='margin-top:8px'></div>
  <div class='muted' id='signalMeta'>未选择策略标记</div>
</div>

<div class='panel'><div><b>回测品种</b></div><div id='assetBtns' class='row' style='margin-top:6px'></div></div>
<div class='panel'><div><b>策略</b></div><div id='stratBtns' class='row' style='margin-top:6px'></div></div>
<div class='panel'><input id='q' placeholder='搜索（文件名/策略关键字）'></div>
<div class='muted' id='meta'>Loading...</div>
<div style='max-height:55vh;overflow:auto'><table><thead><tr><th>品种</th><th>策略</th><th>收益率%</th><th>来源文件</th></tr></thead><tbody id='tb'></tbody></table></div>

<script>
let data=[]; let asset='btc'; let strat='ALL';
let btc=[]; let strategyParams={};
const tb=document.getElementById('tb'), meta=document.getElementById('meta'), q=document.getElementById('q');
const assetWrap=document.getElementById('assetBtns'), stratWrap=document.getElementById('stratBtns');
const signalMeta=document.getElementById('signalMeta');

const uniq=a=>[...new Set(a)].filter(Boolean).sort();
const fmt=v=> (v===null||v===undefined||Number.isNaN(v))?'-':Number(v).toLocaleString(undefined,{maximumFractionDigits:2});
function mkBtn(text, active, onClick){const b=document.createElement('button');b.className='btn'+(active?' active':'');b.textContent=text;b.onclick=onClick;return b;}

function rollingMean(arr, w){
  const out = Array(arr.length).fill(null);
  if(w<=0 || w>arr.length) return out;
  let s=0;
  for(let i=0;i<arr.length;i++){
    s += arr[i];
    if(i>=w) s -= arr[i-w];
    if(i>=w-1) out[i] = s/w;
  }
  return out;
}

function computeSignals(cfg){
  const startDate = cfg.start_date || null;
  const filtered = startDate ? btc.filter(x => x.date >= startDate) : btc;
  const close = filtered.map(x=>x.close);
  const dates = filtered.map(x=>x.date);
  const mf = rollingMean(close, cfg.fast);
  const ms = rollingMean(close, cfg.slow);
  const mt = cfg.trend ? rollingMean(close, cfg.trend) : null;

  // Execute-style signal simulation (same spirit as backtest):
  // states: -1 short, 0 flat, +1 long
  // enforce: no consecutive same-side opens
  // flip allowed same day but must be close then open
  let pos = 0;
  let pending = 0;
  let lastOpenDir = 0;

  const longs = [];
  const shorts = [];

  for(let i=1;i<close.length;i++){
    // execute pending first at today's close
    if(pending !== pos){
      if(pos !== 0){
        pos = 0; // close existing first
      }
      if(pending !== 0 && pending !== lastOpenDir){
        pos = pending;
        lastOpenDir = pending;
        if(pos === 1) longs.push({x:dates[i], y:close[i]});
        if(pos === -1) shorts.push({x:dates[i], y:close[i]});
      }
    }

    // produce today's new pending from crossover/trend rule
    if(mf[i-1]==null || mf[i]==null || ms[i-1]==null || ms[i]==null){
      continue;
    }

    const bullCross = (mf[i-1] <= ms[i-1] && mf[i] > ms[i]);
    const bearCross = (mf[i-1] >= ms[i-1] && mf[i] < ms[i]);
    let longOK = bullCross;
    let shortOK = bearCross;

    if(cfg.type==='sym_trend' && mt){
      if(mt[i]==null) continue;
      longOK = longOK && (close[i] > mt[i]);
      shortOK = shortOK && (close[i] < mt[i]);
    }

    if(longOK) pending = 1;
    else if(shortOK) pending = -1;
  }

  return {longs, shorts, startDate};
}

function drawChart(cfgKey){
  const btcView = btc.filter(d => d.date >= '2017-11-01');
  const x = btcView.map(d=>d.date), y = btcView.map(d=>d.close);
  const traces = [{x, y, type:'scatter', mode:'lines', name:'BTC Close', line:{color:'#9bb8ff', width:1.6}}];

  if(cfgKey && strategyParams[cfgKey]){
    const cfg = strategyParams[cfgKey];
    const {longs, shorts, startDate} = computeSignals(cfg);
    traces.push({x: longs.map(p=>p.x), y: longs.map(p=>p.y), type:'scatter', mode:'markers', name:'做多点', marker:{color:'#18d26e', size:6, symbol:'triangle-up'}});
    traces.push({x: shorts.map(p=>p.x), y: shorts.map(p=>p.y), type:'scatter', mode:'markers', name:'做空点', marker:{color:'#ff5d6c', size:6, symbol:'triangle-down'}});
    const rangeTxt = startDate ? ` ｜ 信号起点 ${startDate}` : '';
    signalMeta.textContent = `当前标记策略: ${cfg.label}${rangeTxt} ｜ 做多点 ${longs.length} ｜ 做空点 ${shorts.length}`;
  } else {
    signalMeta.textContent = '未选择策略标记（当前仅展示BTC全走势）';
  }

  Plotly.newPlot('chart', traces, {
    paper_bgcolor:'#131b3b', plot_bgcolor:'#101833',
    margin:{l:45,r:15,t:10,b:40},
    xaxis:{color:'#cfd8ff', gridcolor:'#25315f'},
    yaxis:{color:'#cfd8ff', gridcolor:'#25315f'},
    legend:{orientation:'h', y:1.12, x:0, font:{color:'#dfe8ff'}},
  }, {responsive:true, displaylogo:false});
}

function renderFilters(){
  const assets=uniq(data.map(x=>x.asset));
  const strats=uniq(Object.keys(strategyParams)); // only show v1..vN strategies with signal definitions
  assetWrap.innerHTML=''; stratWrap.innerHTML='';
  assetWrap.appendChild(mkBtn('全部', asset==='ALL', ()=>{asset='ALL'; render(); renderFilters(); drawChart(null);}));
  assets.forEach(a=>assetWrap.appendChild(mkBtn(a, asset===a, ()=>{asset=a; render(); renderFilters(); if(a!=='btc') drawChart(null);} )));

  stratWrap.appendChild(mkBtn('全部', strat==='ALL', ()=>{strat='ALL'; render(); renderFilters(); drawChart(null);}));
  strats.forEach(s=>{
    const txt = (strategyParams[s] && strategyParams[s].label) ? strategyParams[s].label : s;
    stratWrap.appendChild(mkBtn(txt, strat===s, ()=>{strat=s; render(); renderFilters(); drawChart(s);}));
  });
}

function render(){
  const kw=q.value.trim().toLowerCase();
  const rows=data.filter(r=>{
    const strategyName = (strategyParams[r.strategy] && strategyParams[r.strategy].label) ? strategyParams[r.strategy].label : r.strategy;
    return (asset==='ALL'||r.asset===asset)
      && (strat==='ALL'||r.strategy===strat)
      && (!kw||JSON.stringify({...r, strategyName}).toLowerCase().includes(kw));
  });
  tb.innerHTML=rows.map(r=>{
    const strategyName = (strategyParams[r.strategy] && strategyParams[r.strategy].label) ? strategyParams[r.strategy].label : r.strategy;
    return `<tr><td>${r.asset}</td><td>${strategyName}</td><td>${fmt(r.return_pct)}</td><td>${r.source_file}</td></tr>`;
  }).join('');
  meta.textContent=`展示 ${rows.length} / ${data.length} 条`;
}
q.addEventListener('input', render);

Promise.all([
  fetch('./data/backtests.json').then(r=>r.json()),
  fetch('./data/btc_price.json').then(r=>r.json()),
  fetch('./data/strategy_params.json').then(r=>r.json())
]).then(([bt, px, sp])=>{
  data = bt.items||[];
  btc = px.items||[];
  strategyParams = sp||{};
  renderFilters();
  render();
  drawChart(null); // default BTC curve
}).catch(e=>{
  meta.textContent='加载失败: '+e;
});
</script>
</body></html>
