<!doctype html><html lang='en'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width, initial-scale=1.0'/><title>20260429-gold Backtest Explorer</title><style>body{font-family:Arial,Helvetica,sans-serif;margin:20px;background:#0b1020;color:#e8ecff}h1{margin:0 0 12px}.row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}select,input{padding:8px;border-radius:8px;border:1px solid #334;background:#101833;color:#fff}table{width:100%;border-collapse:collapse;background:#11193a}th,td{padding:8px;border-bottom:1px solid #2a3768;text-align:left;font-size:14px}th{background:#16214a}.muted{opacity:.8}</style></head><body><h1>20260429-gold · Backtest Explorer</h1><div class='row'><select id='asset'><option value=''>All Assets</option></select><select id='strategy'><option value=''>All Strategies</option></select><input id='q' placeholder='search keyword...'/></div><div class='muted' id='meta'></div><table><thead><tr><th>Asset</th><th>Strategy</th><th>Return %</th><th>Source</th></tr></thead><tbody id='tb'></tbody></table><script>let data=[];const tb=document.getElementById('tb');const assetSel=document.getElementById('asset');const strategySel=document.getElementById('strategy');const q=document.getElementById('q');const meta=document.getElementById('meta');function uniq(arr){return [...new Set(arr)].filter(Boolean).sort();}function fmt(v){return (v===null||v===undefined||Number.isNaN(v))?'-':Number(v).toLocaleString(undefined,{maximumFractionDigits:2});}function render(){const a=assetSel.value.toLowerCase();const s=strategySel.value.toLowerCase();const kw=q.value.trim().toLowerCase();const rows=data.filter(x=>(!a||x.asset.toLowerCase()===a)&&(!s||x.strategy.toLowerCase()===s)&&(!kw||JSON.stringify(x).toLowerCase().includes(kw)));tb.innerHTML=rows.map(r=>`<tr><td>${r.asset}</td><td>${r.strategy}</td><td>${fmt(r.return_pct)}</td><td>${r.source_file}</td></tr>`).join('');meta.textContent=`Showing ${rows.length} / ${data.length}`;}fetch('./data/backtests.json').then(r=>r.json()).then(j=>{data=j.items||[];uniq(data.map(x=>x.asset)).forEach(v=>assetSel.insertAdjacentHTML('beforeend',`<option>${v}</option>`));uniq(data.map(x=>x.strategy)).forEach(v=>strategySel.insertAdjacentHTML('beforeend',`<option>${v}</option>`));[assetSel,strategySel,q].forEach(el=>el.addEventListener('input',render));render();});</script></body></html>
